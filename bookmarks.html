<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your saved plants on PlantScope">
  <title>Saved Plants — PlantScope</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css">
  <link rel="stylesheet" href="./css/app.css">

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js"
    }
  }
  </script>

  <script type="module" src="./js/application.js"></script>
</head>
<body data-controller="bookmark">
  <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation" style="background-color:#16213e;border-bottom:1px solid #2d3a52;">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item has-text-weight-bold" href="/" style="color:#4CAF50;">
          <span class="icon mr-1"><span>🌿</span></span>
          <span>PlantScope</span>
        </a>
        <a class="navbar-item is-hidden-desktop ml-auto" href="/bookmarks.html" style="color:#4CAF50;">
          <span class="icon"><span>★</span></span>
          <span>Saved</span>
        </a>
      </div>
      <div class="navbar-end is-hidden-touch">
        <a class="navbar-item" href="/bookmarks.html" style="color:#4CAF50;">
          <span class="icon"><span>★</span></span>
          <span>Saved</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="section pt-5">
    <div class="container">
      <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
        <h1 class="title is-4 mb-0">Saved Plants</h1>
      </div>
      <div class="field mb-4">
        <div class="control has-icons-left">
          <input class="input" type="text" placeholder="Filter saved plants..."
            data-bookmark-target="filterInput"
            data-action="input->bookmark#onFilter">
          <span class="icon is-left">🔍</span>
        </div>
      </div>
      <div class="bookmarks-list" data-bookmark-target="list"></div>
    </div>
  </main>
</body>
</html>
