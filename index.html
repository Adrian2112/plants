<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantScope</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css">
  <link rel="stylesheet" href="./css/app.css">

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js"
    }
  }
  </script>

  <script type="module" src="./js/application.js"></script>
</head>
<body>
  <nav class="navbar is-fixed-top has-shadow" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="/">
        <span class="icon mr-1"><span>🌿</span></span>
        <span>PlantScope</span>
      </a>
      <a class="navbar-item is-hidden-desktop ml-auto" href="/bookmarks.html">
        <span class="icon"><span>☆</span></span>
        <span>Saved</span>
      </a>
    </div>
    <div class="navbar-end is-hidden-touch">
      <a class="navbar-item" href="/bookmarks.html">
        <span class="icon"><span>☆</span></span>
        <span>Saved</span>
      </a>
    </div>
  </nav>

  <main class="section pt-6">
    <div class="container" data-controller="search" data-action="search:loaded->plant#show">
      <div class="field">
        <div class="control has-icons-left">
          <input id="search-input" class="input" type="text"
            placeholder="Search plant or paste iNaturalist URL..."
            data-search-target="input"
            data-action="input->search#onInput">
          <span class="icon is-left">🔍</span>
        </div>
      </div>

      <div class="autocomplete-results" data-search-target="results"></div>

      <div data-search-target="error"></div>

      <div data-controller="plant" data-action="search:loaded@document->plant#show">
        <div data-plant-target="container"></div>
      </div>

      <div data-controller="bookmark" data-action="search:loaded@document->bookmark#show notes:autobookmarked@document->bookmark#show" style="display:none;" id="bookmark-section">
        <button class="button is-outlined is-fullwidth mb-4" data-bookmark-target="button" data-action="click->bookmark#toggle" style="display:none;"></button>
        <div class="toast" data-bookmark-target="toast"></div>
      </div>

      <div data-controller="seasonality" data-action="search:loaded@document->seasonality#show">
        <div class="box mt-4">
          <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
            <h2 class="title is-5 mb-0">Seasonality</h2>
            <div class="select is-small">
              <select data-seasonality-target="filter" data-action="change->seasonality#onFilterChange">
                <option>All</option>
                <option>Flowering</option>
                <option>Fruiting</option>
                <option>Budding</option>
              </select>
            </div>
          </div>
          <div data-seasonality-target="chart"></div>
          <p class="has-text-grey is-size-7 mt-2" data-seasonality-target="empty" style="display:none;"></p>
        </div>
      </div>

      <div data-controller="gallery" data-action="search:loaded@document->gallery#show">
        <div class="box mt-4">
          <h2 class="title is-5 mb-3">Photos</h2>
          <div class="tabs is-small is-toggle gallery-tabs">
            <ul data-gallery-target="tabs"></ul>
          </div>
          <div class="gallery-grid" data-gallery-target="grid"></div>
          <p class="has-text-grey is-size-7 mt-2" data-gallery-target="empty" style="display:none;"></p>
          <div class="has-text-centered mt-3" data-gallery-target="loadMore" style="display:none;">
            <a class="button is-small is-outlined" data-action="click->gallery#onLoadMore">Load more</a>
          </div>
        </div>

        <div class="modal" data-gallery-target="lightbox">
          <div class="modal-background" data-action="click->gallery#closeLightbox"></div>
          <div class="modal-content lightbox-content">
            <div class="lightbox-nav lightbox-prev" data-action="click->gallery#prevPhoto">‹</div>
            <img data-gallery-target="lightboxImg" src="" alt="Photo">
            <div class="lightbox-nav lightbox-next" data-action="click->gallery#nextPhoto">›</div>
            <p class="lightbox-caption" data-gallery-target="lightboxCaption"></p>
          </div>
          <button class="modal-close is-large" aria-label="close" data-action="click->gallery#closeLightbox"></button>
        </div>
      </div>

      <div data-controller="notes" data-action="search:loaded@document->notes#show">
        <div class="box mt-4">
          <h2 class="title is-5 mb-3">Ethnobotany</h2>
          <div data-notes-target="list"></div>
          <p class="has-text-grey is-size-7" data-notes-target="empty">No ethnobotanical notes yet. Add one below.</p>
          <button class="button is-small is-outlined mt-2" data-notes-target="addBtn" data-action="click->notes#showForm">+ Add note</button>
          <form data-notes-target="form" data-action="submit->notes#onSave" style="display:none;" class="mt-3">
            <div class="field">
              <textarea class="textarea is-small" placeholder="Note text..." data-notes-target="formText" required></textarea>
            </div>
            <div class="field">
              <input class="input is-small" type="url" placeholder="Reference URL (optional)" data-notes-target="formUrl">
            </div>
            <div class="field is-grouped">
              <button type="submit" class="button is-small is-success">Save</button>
              <button type="button" class="button is-small" data-action="click->notes#hideForm">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
