<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantScope</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css">
  <link rel="stylesheet" href="./css/app.css">

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js"
    }
  }
  </script>

  <script type="module" src="./js/application.js"></script>
</head>
<body>
  <nav class="navbar is-fixed-top has-shadow" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="/">
        <span class="icon mr-1"><span>🌿</span></span>
        <span>PlantScope</span>
      </a>
      <a class="navbar-item is-hidden-desktop ml-auto" href="/bookmarks.html">
        <span class="icon"><span>☆</span></span>
        <span>Saved</span>
      </a>
    </div>
    <div class="navbar-end is-hidden-touch">
      <a class="navbar-item" href="/bookmarks.html">
        <span class="icon"><span>☆</span></span>
        <span>Saved</span>
      </a>
    </div>
  </nav>

  <main class="section pt-6">
    <div class="container" data-controller="search" data-action="search:loaded->plant#show">
      <div class="field">
        <div class="control has-icons-left">
          <input id="search-input" class="input" type="text"
            placeholder="Search plant or paste iNaturalist URL..."
            data-search-target="input"
            data-action="input->search#onInput">
          <span class="icon is-left">🔍</span>
        </div>
      </div>

      <div class="autocomplete-results" data-search-target="results"></div>

      <div data-search-target="error"></div>

      <div data-controller="plant" data-action="search:loaded@document->plant#show">
        <div data-plant-target="container"></div>
      </div>

      <div data-controller="seasonality" data-action="search:loaded@document->seasonality#show">
        <div class="box mt-4">
          <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
            <h2 class="title is-5 mb-0">Seasonality</h2>
            <div class="select is-small">
              <select data-seasonality-target="filter" data-action="change->seasonality#onFilterChange">
                <option>All</option>
                <option>Flowering</option>
                <option>Fruiting</option>
                <option>Budding</option>
              </select>
            </div>
          </div>
          <div data-seasonality-target="chart"></div>
          <p class="has-text-grey is-size-7 mt-2" data-seasonality-target="empty" style="display:none;"></p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
