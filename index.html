<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="PlantScope — explore plant info, photos, and seasonality from iNaturalist">
  <meta property="og:title" content="PlantScope">
  <meta property="og:description" content="Explore plant info, photos, and seasonality from iNaturalist">
  <meta property="og:type" content="website">
  <title>PlantScope</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://api.inaturalist.org">
  <link rel="preconnect" href="https://inaturalist-open-data.s3.amazonaws.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.min.css">
  <link rel="stylesheet" href="./css/app.css">

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js",
      "leaflet": "https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet-src.esm.js"
    }
  }
  </script>

  <script type="module" src="./js/application.js"></script>
</head>
<body data-controller="search bookmark settings" data-search-navigate-to="taxon.html">
  <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation" style="background-color:#16213e;border-bottom:1px solid #2d3a52;" data-controller="location">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item has-text-weight-bold" href="index.html" style="color:#4CAF50;">
          <span class="icon mr-1"><span>🌿</span></span>
          <span>PlantScope</span>
        </a>
        <div class="navbar-item is-hidden-desktop ml-auto" data-location-target="toggle"></div>
        <a class="navbar-item is-hidden-desktop" href="pokedex.html" style="color:#a0aec0;font-size:1.1rem;">📖</a>
        <button class="navbar-item is-hidden-desktop button is-ghost" data-action="click->settings#open" style="color:#a0aec0;background:none;border:none;cursor:pointer;">
          ⚙️
        </button>
      </div>

      <div class="navbar-menu">
        <div class="navbar-item is-expanded px-4">
          <div class="navbar-search-wrapper">
            <div class="control has-icons-left">
              <input class="input" type="text"
                placeholder="Search plant or paste iNaturalist URL..."
                autocomplete="off"
                data-search-target="input"
                data-action="input->search#onInput">
              <span class="icon is-left">🔍</span>
            </div>
            <div class="autocomplete-results" data-search-target="results"></div>
          </div>
        </div>
        <div class="navbar-end">
          <div class="navbar-item is-hidden-touch" data-location-target="toggle"></div>
          <a class="navbar-item" href="pokedex.html" style="color:#a0aec0;">
            <span class="icon"><span>📖</span></span>
            <span>Field Guide</span>
          </a>
          <a class="navbar-item" href="#" data-action="click->settings#open" style="color:#a0aec0;">
            <span class="icon"><span>⚙️</span></span>
            <span>Settings</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="section pt-5">
    <div class="container">

      <!-- Mobile search (hidden on desktop) -->
      <div class="field is-hidden-desktop mb-3">
        <div class="control has-icons-left">
          <input class="input" type="text"
            placeholder="Search plant or paste iNaturalist URL..."
            autocomplete="off"
            data-search-target="input"
            data-action="input->search#onInput">
          <span class="icon is-left">🔍</span>
        </div>
      </div>
      <div class="autocomplete-results is-hidden-desktop" data-search-target="results"></div>

      <div data-search-target="error"></div>

      <!-- Filter input shared by all lists -->
      <div class="field mb-4 mt-4">
        <div class="control has-icons-left">
          <input class="input" type="text" placeholder="Filter…"
            data-bookmark-target="filterInput"
            data-action="input->bookmark#onFilter input->observations#onFilter input->nearby#onFilter">
          <span class="icon is-left">🔍</span>
        </div>
      </div>

      <!-- Saved plants -->
      <div data-bookmark-target="panel">
        <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
          <h2 class="title is-5 mb-0">
            Saved Plants
            <span class="saved-panel-count" data-bookmark-target="savedCount" style="display:none;"></span>
          </h2>
        </div>
        <div class="bookmarks-list" data-bookmark-target="list"></div>
      </div>

      <!-- Species I've observed -->
      <div data-controller="observations" data-action="settings:changed@document->observations#onSettingsChanged">
        <details class="mt-5" data-observations-target="details" data-action="toggle->observations#onToggle">
          <summary class="title is-5 mb-0" style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:0.5rem;">
            <span>Species I've Observed</span>
          </summary>
          <div data-observations-target="list" class="mt-3"></div>
        </details>
      </div>

      <!-- Species near me -->
      <div data-controller="nearby">
        <details class="mt-5" data-nearby-target="details" data-action="toggle->nearby#onToggle">
          <summary class="title is-5 mb-0" style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:0.5rem;">
            <span data-nearby-target="title">Species Near Me</span>
          </summary>
          <div data-nearby-target="list" class="mt-3"></div>
        </details>
      </div>

    </div>
  </main>

  <!-- Settings modal -->
  <div class="modal" data-settings-target="modal">
    <div class="modal-background" data-action="click->settings#close"></div>
    <div class="modal-card">
      <header class="modal-card-head">
        <p class="modal-card-title">Settings</p>
        <button class="delete" aria-label="close" data-action="click->settings#close"></button>
      </header>
      <section class="modal-card-body">
        <div class="field">
          <label class="label">iNaturalist Username</label>
          <div class="control">
            <input class="input" type="text" placeholder="your_username" data-settings-target="usernameInput">
          </div>
          <p class="help">Used to show species you've personally observed.</p>
        </div>
        <div class="field">
          <label class="label">Primary Language</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select data-settings-target="primaryLanguageSelect"></select>
            </div>
          </div>
          <p class="help">Language for common names.</p>
        </div>
        <div class="field">
          <label class="label">Secondary Language</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select data-settings-target="secondaryLanguageSelect"></select>
            </div>
          </div>
          <p class="help">Shows an additional name below the primary name.</p>
        </div>
        <div class="field">
          <label class="label">Xeno-canto API Key</label>
          <div class="control">
            <input class="input" type="text" placeholder="your_api_key" data-settings-target="xenoCantoApiKeyInput">
          </div>
          <p class="help">Required to load bird sounds.</p>
        </div>
      </section>
      <footer class="modal-card-foot" style="gap:0.5rem;">
        <button class="button is-success" data-action="click->settings#save">Save</button>
        <button class="button" data-action="click->settings#close">Cancel</button>
      </footer>
    </div>
  </div>

</body>
</html>
