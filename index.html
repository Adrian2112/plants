<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PlantScope — explore plant info, photos, and seasonality from iNaturalist">
  <meta property="og:title" content="PlantScope">
  <meta property="og:description" content="Explore plant info, photos, and seasonality from iNaturalist">
  <meta property="og:type" content="website">
  <title>PlantScope</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://api.inaturalist.org">
  <link rel="preconnect" href="https://inaturalist-open-data.s3.amazonaws.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.min.css">
  <link rel="stylesheet" href="./css/app.css">

  <script type="importmap">
  {
    "imports": {
      "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8/dist/turbo.es2017-esm.js",
      "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js",
      "leaflet": "https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet-src.esm.js"
    }
  }
  </script>

  <script type="module" src="./js/application.js"></script>
</head>
<body data-controller="search bookmark" data-search-navigate-to="taxon.html">
  <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation" style="background-color:#16213e;border-bottom:1px solid #2d3a52;">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item has-text-weight-bold" href="/" style="color:#4CAF50;">
          <span class="icon mr-1"><span>🌿</span></span>
          <span>PlantScope</span>
        </a>
        <a class="navbar-item is-hidden-desktop ml-auto" href="/" style="color:#a0aec0;">
          <span class="icon"><span>☆</span></span>
          <span>Saved</span>
        </a>
      </div>

      <div class="navbar-menu">
        <div class="navbar-item is-expanded px-4">
          <div class="navbar-search-wrapper">
            <div class="control has-icons-left">
              <input class="input" type="text"
                placeholder="Search plant or paste iNaturalist URL..."
                data-search-target="input"
                data-action="input->search#onInput">
              <span class="icon is-left">🔍</span>
            </div>
            <div class="autocomplete-results" data-search-target="results"></div>
          </div>
        </div>
        <div class="navbar-end">
          <a class="navbar-item" href="/" style="color:#a0aec0;">
            <span class="icon"><span>☆</span></span>
            <span>Saved</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="section pt-5">
    <div class="container">

      <!-- Mobile search (hidden on desktop) -->
      <div class="field is-hidden-desktop mb-3">
        <div class="control has-icons-left">
          <input class="input" type="text"
            placeholder="Search plant or paste iNaturalist URL..."
            data-search-target="input"
            data-action="input->search#onInput">
          <span class="icon is-left">🔍</span>
        </div>
      </div>
      <div class="autocomplete-results is-hidden-desktop" data-search-target="results"></div>

      <div data-search-target="error"></div>

      <!-- Saved plants panel -->
      <div data-bookmark-target="panel" class="mt-4">
        <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
          <h2 class="title is-5 mb-0">
            Saved Plants
            <span class="saved-panel-count" data-bookmark-target="savedCount" style="display:none;"></span>
          </h2>
        </div>
        <div class="field mb-4">
          <div class="control has-icons-left">
            <input class="input" type="text" placeholder="Filter saved plants..."
              data-bookmark-target="filterInput"
              data-action="input->bookmark#onFilter">
            <span class="icon is-left">🔍</span>
          </div>
        </div>
        <div class="bookmarks-list" data-bookmark-target="list"></div>
      </div>

    </div>
  </main>
</body>
</html>
